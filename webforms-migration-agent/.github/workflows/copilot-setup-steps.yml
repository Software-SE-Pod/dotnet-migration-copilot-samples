name: Copilot Setup Steps
# This workflow configures the runner environment for the Copilot Coding Agent.
# It installs .NET Framework targeting packs, .NET 8, Node 20, and NSwag so that
# the Coding Agent can build and test both the legacy WebForms app and the new
# React + .NET Core stack.

on: workflow_dispatch

jobs:
  setup:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Set up .NET (Framework 4.8 + .NET 8)
        uses: dotnet/modernize-dotnet-actions@main
        with:
          dotnet-version: "8.0.x"
          install-framework-targeting-packs: "true"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NSwag globally
        run: dotnet tool install --global NSwag.ConsoleCore

      - name: Install Playwright browsers (for smoke tests)
        run: npx playwright install --with-deps chromium

      - name: Verify tools
        run: |
          dotnet --version
          node --version
          npm --version
          nswag version
          Write-Host "All tools installed successfully."
