openapi: 3.0.3
info:
  title: Power API
  version: 0.1.0
servers:
  - url: http://localhost:5000
  - url: http://localhost:5173
paths:
  /api/contosouniversity-webforms-pages-departments-departmentlist:
    get:
      operationId: getContosouniversityWebformsPagesDepartmentsDepartmentlist
      summary: Get Departments grid page view model
      tags: [contosouniversity-webforms-pages-departments-departmentlist]
      x-page-id: contosouniversity-webforms-pages-departments-departmentlist
      responses:
        "200":
          description: Departments grid page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmentlistViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/contosouniversity-webforms-pages-departments-departmentlist/items:
    get:
      operationId: listContosouniversityWebformsPagesDepartmentsDepartmentlistItems
      summary: List departments for grid with paging and sorting
      tags: [contosouniversity-webforms-pages-departments-departmentlist]
      x-page-id: contosouniversity-webforms-pages-departments-departmentlist
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: Page index (zero-based)
        - in: query
          name: pageSize
          schema:
            type: integer
          description: Page size
        - in: query
          name: sort
          schema:
            type: string
          description: Sort expression (e.g. "Name:asc")
      responses:
        "200":
          description: Paged list of departments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageContosouniversityWebformsPagesDepartmentsDepartmentlistPage'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-default:
    get:
      operationId: getContosouniversityWebformsPagesDefault
      summary: Get Default page dashboard stats
      tags: [contosouniversity-webforms-pages-default]
      x-page-id: contosouniversity-webforms-pages-default
      responses:
        "200":
          description: Default dashboard stats view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesDefaultViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/contosouniversity-webforms-pages-admin-dashboard:
    get:
      operationId: getContosouniversityWebformsPagesAdminDashboard
      summary: Get Admin Dashboard page view model
      tags: [contosouniversity-webforms-pages-admin-dashboard]
      x-page-id: contosouniversity-webforms-pages-admin-dashboard
      responses:
        "200":
          description: Admin Dashboard page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesAdminDashboardViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/contosouniversity-webforms-pages-admin-dashboard/items:
    get:
      operationId: listContosouniversityWebformsPagesAdminDashboardItems
      summary: List recent enrollments for dashboard grid
      tags: [contosouniversity-webforms-pages-admin-dashboard]
      x-page-id: contosouniversity-webforms-pages-admin-dashboard
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: Page index (zero-based)
        - in: query
          name: pageSize
          schema:
            type: integer
          description: Page size
        - in: query
          name: sort
          schema:
            type: string
          description: Sort expression (e.g. "Student:asc")
      responses:
        "200":
          description: List of recent enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContosouniversityWebformsPagesAdminDashboardRecentEnrollmentItem'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/contosouniversity-webforms-pages-reports-enrollmentstats:
    get:
      operationId: getContosouniversityWebformsPagesReportsEnrollmentstats
      summary: Get Enrollment Stats page view model
      tags: [contosouniversity-webforms-pages-reports-enrollmentstats]
      x-page-id: contosouniversity-webforms-pages-reports-enrollmentstats
      parameters:
        - in: query
          name: departmentId
          schema:
            type: integer
          description: Filter by department ID
      responses:
        "200":
          description: Enrollment Stats page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesReportsEnrollmentstatsViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-reports-enrollmentstats/export:
    post:
      operationId: exportContosouniversityWebformsPagesReportsEnrollmentstats
      summary: Export Enrollment Stats report as CSV
      tags: [contosouniversity-webforms-pages-reports-enrollmentstats]
      x-page-id: contosouniversity-webforms-pages-reports-enrollmentstats
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                departmentId:
                  type: integer
                  description: Filter by department ID
      responses:
        "200":
          description: CSV export result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesReportsEnrollmentstatsExportCsvResult'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [health]
      x-page-id: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthViewModel'

  /api/contosouniversity-webforms-pages-courses-courselist:
    get:
      operationId: getContosouniversityWebformsPagesCoursesCourselist
      summary: Get Course List page view model
      tags: [contosouniversity-webforms-pages-courses-courselist]
      x-page-id: contosouniversity-webforms-pages-courses-courselist
      parameters:
        - in: query
          name: departmentId
          schema:
            type: integer
          description: Filter by department ID
        - in: query
          name: page
          schema:
            type: integer
          description: Page index (zero-based)
        - in: query
          name: pageSize
          schema:
            type: integer
          description: Page size
      responses:
        "200":
          description: Course List page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourselistViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-departments-departmentedit:
    get:
      operationId: getContosouniversityWebformsPagesDepartmentsDepartmentedit
      summary: Get Department Edit page view model
      tags: [contosouniversity-webforms-pages-departments-departmentedit]
      x-page-id: contosouniversity-webforms-pages-departments-departmentedit
      parameters:
        - in: query
          name: id
          schema:
            type: integer
          description: Department ID (for edit)
      responses:
        "200":
          description: Department Edit page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-students-studentedit:
    get:
      operationId: getContosouniversityWebformsPagesStudentsStudentedit
      summary: Get Student Edit page view model
      tags: [contosouniversity-webforms-pages-students-studentedit]
      x-page-id: contosouniversity-webforms-pages-students-studentedit
      parameters:
        - in: query
          name: id
          schema:
            type: integer
          description: Student ID (for edit)
      responses:
        "200":
          description: Student Edit page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesStudentsStudenteditViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-students-studentedit/submit:
    post:
      operationId: submitContosouniversityWebformsPagesStudentsStudentedit
      summary: Submit Student Edit form
      tags: [contosouniversity-webforms-pages-students-studentedit]
      x-page-id: contosouniversity-webforms-pages-students-studentedit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContosouniversityWebformsPagesStudentsStudenteditSubmitRequest'
      responses:
        "200":
          description: Result of submitting the Student Edit form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesStudentsStudenteditSubmitResult'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: submitContosouniversityWebformsPagesDepartmentsDepartmentedit
      summary: Submit Department Edit form
      tags: [contosouniversity-webforms-pages-departments-departmentedit]
      x-page-id: contosouniversity-webforms-pages-departments-departmentedit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditSubmitRequest'
      responses:
        "200":
          description: Result of submitting the Department Edit form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditSubmitResult'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "409":
          description: Concurrency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-instructors-instructoredit:
    get:
      operationId: getContosouniversityWebformsPagesInstructorsInstructoredit
      summary: Get Instructor Edit page view model
      tags: [contosouniversity-webforms-pages-instructors-instructoredit]
      x-page-id: contosouniversity-webforms-pages-instructors-instructoredit
      parameters:
        - in: query
          name: id
          schema:
            type: integer
          description: Instructor ID (for edit)
      responses:
        "200":
          description: Instructor Edit page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructoreditViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: submitContosouniversityWebformsPagesInstructorsInstructoredit
      summary: Submit Instructor Edit form
      tags: [contosouniversity-webforms-pages-instructors-instructoredit]
      x-page-id: contosouniversity-webforms-pages-instructors-instructoredit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructoreditSubmitRequest'
      responses:
        "200":
          description: Result of submitting the Instructor Edit form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructoreditSubmitResult'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/contosouniversity-webforms-pages-instructors-instructorlist:
    get:
      operationId: getContosouniversityWebformsPagesInstructorsInstructorlist
      summary: Get Instructor List page view model
      tags: [contosouniversity-webforms-pages-instructors-instructorlist]
      x-page-id: contosouniversity-webforms-pages-instructors-instructorlist
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: Page index (zero-based)
        - in: query
          name: pageSize
          schema:
            type: integer
          description: Page size
        - in: query
          name: sort
          schema:
            type: string
          description: Sort expression (e.g. "LastName:asc")
      responses:
        "200":
          description: Instructor List page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructorlistViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    ContosouniversityWebformsPagesDepartmentsDepartmentlistViewModel:
      description: View model for the Departments grid page.
      type: object
      properties:
        items:
          type: array
          description: List of departments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmentlistDepartmentItem'
        totalCount:
          type: integer
          description: Total number of departments (for pagination)
    ContosouniversityWebformsPagesDepartmentsDepartmentlistDepartmentItem:
      description: Department item for the grid
      type: object
      properties:
        departmentId:
          type: integer
          description: Department ID
        name:
          type: string
          description: Department name
        budget:
          type: string
          format: decimal
          pattern: "^-?\\d+(\\.\\d{1,4})?$"
          description: Department budget
        startDate:
          type: string
          format: date-time
          description: Department start date
        administrator:
          type: string
          description: Administrator full name
    PageContosouniversityWebformsPagesDepartmentsDepartmentlistPage:
      description: Envelope for paged grid results
      type: object
      properties:
        items:
          type: array
          description: List of departments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmentlistDepartmentItem'
        totalCount:
          type: integer
          description: Total number of departments

    ContosouniversityWebformsPagesDefaultViewModel:
      description: View model for the Default dashboard page.
      type: object
      properties:
        studentCount:
          type: integer
          description: Total number of students
        courseCount:
          type: integer
          description: Total number of courses
        departmentCount:
          type: integer
          description: Total number of departments
    ContosouniversityWebformsPagesAdminDashboardViewModel:
      description: View model for the Admin Dashboard page.
      type: object
      properties:
        totalStudents:
          type: integer
          description: Total number of students
        totalCourses:
          type: integer
          description: Total number of courses
        totalDepartments:
          type: integer
          description: Total number of departments
        totalInstructors:
          type: integer
          description: Total number of instructors
        totalEnrollments:
          type: integer
          description: Total number of enrollments
        recentEnrollments:
          type: array
          description: List of recent enrollments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesAdminDashboardRecentEnrollmentItem'
        dashboardVisits:
          type: integer
          description: Number of times the user has visited the dashboard (from session)
        sessionId:
          type: string
          description: ASP.NET session ID
        server:
          type: string
          description: Server machine name
        dotnetVersion:
          type: string
          description: .NET runtime version
    ContosouniversityWebformsPagesAdminDashboardRecentEnrollmentItem:
      description: Recent enrollment item for the dashboard grid.
      type: object
      properties:
        studentFullName:
          type: string
          description: Student full name
        courseTitle:
          type: string
          description: Course title
        grade:
          type: string
          description: Grade
    
    ContosouniversityWebformsPagesReportsEnrollmentstatsViewModel:
      description: View model for the Enrollment Stats page.
      type: object
      properties:
        departmentOptions:
          type: array
          description: List of available departments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesReportsEnrollmentstatsDepartmentOption'
        selectedDepartmentId:
          type: integer
          description: Selected department ID for filtering
        enrollments:
          type: array
          description: List of enrollment statistics by course
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesReportsEnrollmentstatsEnrollmentItem'
        yearlyStats:
          type: array
          description: List of yearly enrollment counts
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesReportsEnrollmentstatsYearlyStat'

    ContosouniversityWebformsPagesReportsEnrollmentstatsDepartmentOption:
      description: Department option for dropdown
      type: object
      properties:
        id:
          type: integer
          description: Department ID
        name:
          type: string
          description: Department name

    ContosouniversityWebformsPagesReportsEnrollmentstatsEnrollmentItem:
      description: Enrollment statistics for a course
      type: object
      properties:
        courseTitle:
          type: string
          description: Course title
        departmentName:
          type: string
          description: Department name
        enrollmentCount:
          type: integer
          description: Number of students enrolled
        averageGrade:
          type: number
          format: float
          description: Average grade (0.0-4.0)

    ContosouniversityWebformsPagesReportsEnrollmentstatsYearlyStat:
      description: Yearly enrollment count
      type: object
      properties:
        year:
          type: integer
          description: Enrollment year
        count:
          type: integer
          description: Number of students enrolled in the year

    ContosouniversityWebformsPagesReportsEnrollmentstatsExportCsvResult:
      description: Result of exporting the Enrollment Stats report as CSV.
      type: object
      properties:
        url:
          type: string
          description: Download URL for the CSV file

    ContosouniversityWebformsPagesInstructorsInstructorlistViewModel:
      description: View model for the Instructor List page.
      type: object
      properties:
        instructors:
          type: array
          description: List of instructors for the grid
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructorlistInstructorItem'
        page:
          type: integer
          description: Current page index (zero-based)
        pageSize:
          type: integer
          description: Page size
        totalCount:
          type: integer
          description: Total number of instructors
    ContosouniversityWebformsPagesInstructorsInstructorlistInstructorItem:
      description: Instructor item for the grid
      type: object
      properties:
        instructorId:
          type: integer
          description: Instructor ID
        lastName:
          type: string
          description: Instructor last name
        firstName:
          type: string
          description: Instructor first name
        hireDate:
          type: string
          format: date-time
          description: Instructor hire date
        officeLocation:
          type: string
          description: Office location
        courses:
          type: array
          description: List of courses taught by the instructor
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructorlistCourseItem'
    ContosouniversityWebformsPagesInstructorsInstructorlistCourseItem:
      description: Course item for instructor
      type: object
      properties:
        courseId:
          type: integer
          description: Course ID
        title:
          type: string
          description: Course title
    ContosouniversityWebformsPagesInstructorsInstructorlistStudentItem:
      description: Student item for selected instructor
      type: object
      properties:
        studentId:
          type: integer
          description: Student ID
        fullName:
          type: string
          description: Student full name
        grade:
          type: string
          description: Student grade

    HealthViewModel:
      type: object
      properties:
        status:
          type: string
          example: OK

    ContosouniversityWebformsPagesInstructorsInstructoreditViewModel:
      description: View model for the Instructor Edit page.
      type: object
      properties:
        instructorId:
          type: integer
          description: Instructor ID (null for new)
        lastName:
          type: string
          description: Instructor last name
        firstName:
          type: string
          description: Instructor first name
        hireDate:
          type: string
          format: date-time
          description: Instructor hire date
        officeLocation:
          type: string
          description: Office location
        courseOptions:
          type: array
          description: List of available courses
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesInstructorsInstructoreditCourseOption'
        assignedCourseIds:
          type: array
          description: List of assigned course IDs
          items:
            type: integer

    ContosouniversityWebformsPagesInstructorsInstructoreditCourseOption:
      description: Course option for checkbox list
      type: object
      properties:
        id:
          type: integer
          description: Course ID
        title:
          type: string
          description: Course title

    ContosouniversityWebformsPagesInstructorsInstructoreditSubmitRequest:
      description: Request to submit the Instructor Edit form.
      type: object
      properties:
        instructorId:
          type: integer
          description: Instructor ID (null for new)
        lastName:
          type: string
          description: Instructor last name
        firstName:
          type: string
          description: Instructor first name
        hireDate:
          type: string
          format: date-time
          description: Instructor hire date
        officeLocation:
          type: string
          description: Office location
        assignedCourseIds:
          type: array
          description: List of assigned course IDs
          items:
            type: integer

    ContosouniversityWebformsPagesInstructorsInstructoreditSubmitResult:
      description: Result of submitting the Instructor Edit form.
      type: object
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        redirectUrl:
          type: string
          description: URL to redirect to after save

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    ContosouniversityWebformsPagesCoursesCourselistViewModel:
      description: View model for the Course List page.
      type: object
      properties:
        departmentOptions:
          type: array
          description: List of available departments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourselistDepartmentOption'
        selectedDepartmentId:
          type: integer
          description: Selected department ID for filtering
        courses:
          type: array
          description: List of courses for the grid
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourselistCourseItem'
        page:
          type: integer
          description: Current page index (zero-based)
        pageSize:
          type: integer
          description: Page size
        totalCount:
          type: integer
          description: Total number of courses

    ContosouniversityWebformsPagesCoursesCourselistDepartmentOption:
      description: Department option for dropdown
      type: object
      properties:
        id:
          type: integer
          description: Department ID
        name:
          type: string
          description: Department name

    ContosouniversityWebformsPagesCoursesCourselistCourseItem:
      description: Course item for the grid
      type: object
      properties:
        courseId:
          type: integer
          description: Course number (1-9999)
        title:
          type: string
          description: Course title
        credits:
          type: integer
          description: Number of credits (0-5)
