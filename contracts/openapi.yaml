openapi: 3.0.3
info:
  title: Power API
  version: 0.1.0
servers:
  - url: http://localhost:5000
  - url: http://localhost:5173
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [health]
      x-page-id: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthViewModel'

  /api/contosouniversity-webforms-pages-courses-courselist:
    get:
      operationId: getContosouniversityWebformsPagesCoursesCourselist
      summary: Get Course List page view model
      tags: [contosouniversity-webforms-pages-courses-courselist]
      x-page-id: contosouniversity-webforms-pages-courses-courselist
      parameters:
        - in: query
          name: departmentId
          schema:
            type: integer
          description: Filter by department ID
        - in: query
          name: page
          schema:
            type: integer
          description: Page index (zero-based)
        - in: query
          name: pageSize
          schema:
            type: integer
          description: Page size
      responses:
        "200":
          description: Course List page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourselistViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/contosouniversity-webforms-pages-departments-departmentedit:
    get:
      operationId: getContosouniversityWebformsPagesDepartmentsDepartmentedit
      summary: Get Department Edit page view model
      tags: [contosouniversity-webforms-pages-departments-departmentedit]
      x-page-id: contosouniversity-webforms-pages-departments-departmentedit
      parameters:
        - in: query
          name: id
          schema:
            type: integer
          description: Department ID (for edit)
      responses:
        "200":
          description: Department Edit page view model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditViewModel'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    post:
      operationId: submitContosouniversityWebformsPagesDepartmentsDepartmentedit
      summary: Submit Department Edit form
      tags: [contosouniversity-webforms-pages-departments-departmentedit]
      x-page-id: contosouniversity-webforms-pages-departments-departmentedit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditSubmitRequest'
      responses:
        "200":
          description: Result of submitting the Department Edit form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditSubmitResult'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "409":
          description: Concurrency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    HealthViewModel:
      type: object
      properties:
        status:
          type: string
          example: OK
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    ContosouniversityWebformsPagesCoursesCourselistViewModel:
      description: View model for the Course List page.
      type: object
      properties:
        departmentOptions:
          type: array
          description: List of available departments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourselistDepartmentOption'
        selectedDepartmentId:
          type: integer
          description: Selected department ID for filtering
        courses:
          type: array
          description: List of courses for the grid
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourselistCourseItem'
        page:
          type: integer
          description: Current page index (zero-based)
        pageSize:
          type: integer
          description: Page size
        totalCount:
          type: integer
          description: Total number of courses

    ContosouniversityWebformsPagesCoursesCourselistDepartmentOption:
      description: Department option for dropdown
      type: object
      properties:
        id:
          type: integer
          description: Department ID
        name:
          type: string
          description: Department name

    ContosouniversityWebformsPagesCoursesCourselistCourseItem:
      description: Course item for the grid
      type: object
      properties:
        courseId:
          type: integer
          description: Course number (1-9999)
        title:
          type: string
          description: Course title
        credits:
          type: integer
          description: Number of credits (0-5)
        departmentName:
          type: string
          description: Department name
        enrolledCount:
          type: integer
          description: Number of students enrolled

    ContosouniversityWebformsPagesCoursesCourseeditViewModel:
      description: View model for the Course Edit page.
      type: object
      properties:
        courseId:
          type: integer
          description: Course number (1-9999)
        title:
          type: string
          description: Course title
        credits:
          type: integer
          description: Number of credits (0-5)
        departmentId:
          type: integer
          description: Department ID
        departmentOptions:
          type: array
          description: List of available departments
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesCoursesCourseeditDepartmentOption'

    ContosouniversityWebformsPagesCoursesCourseeditDepartmentOption:
      description: Department option for dropdown
      type: object
      properties:
        id:
          type: integer
          description: Department ID
        name:
          type: string
          description: Department name

    ContosouniversityWebformsPagesCoursesCourseeditSubmitRequest:
      description: Request to submit the Course Edit form.
      type: object
      properties:
        courseId:
          type: integer
          description: Course number (1-9999)
        title:
          type: string
          description: Course title
        credits:
          type: integer
          description: Number of credits (0-5)
        departmentId:
          type: integer
          description: Department ID

    ContosouniversityWebformsPagesCoursesCourseeditSubmitResult:
      description: Result of submitting the Course Edit form.
      type: object
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        redirectUrl:
          type: string
          description: URL to redirect to after save

    ContosouniversityWebformsPagesDepartmentsDepartmenteditViewModel:
      description: View model for the Department Edit page.
      type: object
      properties:
        departmentId:
          type: integer
          description: Department ID (null for new)
        name:
          type: string
          description: Department name
        budget:
          type: string
          format: decimal
          pattern: "^-?\\d+(\\.\\d{1,4})?$"
          description: Department budget
        startDate:
          type: string
          format: date-time
          description: Department start date
        instructorId:
          type: integer
          nullable: true
          description: Administrator instructor ID
        instructorOptions:
          type: array
          description: List of available instructors
          items:
            $ref: '#/components/schemas/ContosouniversityWebformsPagesDepartmentsDepartmenteditInstructorOption'
        rowVersion:
          type: string
          description: Row version for optimistic concurrency (base64)

    ContosouniversityWebformsPagesDepartmentsDepartmenteditInstructorOption:
      description: Instructor option for dropdown
      type: object
      properties:
        id:
          type: integer
          description: Instructor ID
        name:
          type: string
          description: Instructor full name

    ContosouniversityWebformsPagesDepartmentsDepartmenteditSubmitRequest:
      description: Request to submit the Department Edit form.
      type: object
      properties:
        departmentId:
          type: integer
          description: Department ID (null for new)
        name:
          type: string
          description: Department name
        budget:
          type: string
          format: decimal
          pattern: "^-?\\d+(\\.\\d{1,4})?$"
          description: Department budget
        startDate:
          type: string
          format: date-time
          description: Department start date
        instructorId:
          type: integer
          nullable: true
          description: Administrator instructor ID
        rowVersion:
          type: string
          description: Row version for optimistic concurrency (base64)

    ContosouniversityWebformsPagesDepartmentsDepartmenteditSubmitResult:
      description: Result of submitting the Department Edit form.
      type: object
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        redirectUrl:
          type: string
          description: URL to redirect to after save
        concurrencyError:
          type: boolean
          description: True if there was a concurrency conflict
